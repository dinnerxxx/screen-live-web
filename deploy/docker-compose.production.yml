services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: node server.js
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./:/app:ro
    expose:
      - "3000"
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    volumes:
      - ./deploy/generated/livekit.yaml:/etc/livekit.yaml:ro
      - caddy_data:/etc/caddy:ro
    ports:
      - "7881:7881/tcp"
      - "50000-60000:50000-60000/udp"
      - "5349:5349/tcp"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./deploy/generated/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
